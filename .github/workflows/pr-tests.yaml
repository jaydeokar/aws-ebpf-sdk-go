name: Automatic Pull Request test

on:
  pull_request:
    branches:
      - "main"
      - "release*"

permissions:
  contents: read

jobs:
  unit-test:
    name: Unit test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest commit in the PR
        uses: actions/checkout@v3
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - name: Set up BPF and Linux Headers
        run: |
          set -euxo pipefail
          sudo apt-get update

          KREL="$(uname -r)"   # e.g. 6.14.0-1017-azure
          sudo apt-get install -y libbpf-dev \
            "linux-tools-${KREL}" \
            "linux-cloud-tools-${KREL}" \
            linux-tools-azure \
            linux-cloud-tools-azure

          # ensure we are using the real bpftool binary, not just a wrapper
          if [ -x "/usr/lib/linux-tools/${KREL}/bpftool" ]; then
            sudo ln -sf "/usr/lib/linux-tools/${KREL}/bpftool" /usr/local/bin/bpftool
          fi

          command -v bpftool
          bpftool version || true
          test -r /sys/kernel/btf/vmlinux

      - name: Build
        run: make build-linux
      - name: Unit test
        run: sudo make unit-test
      - name: Upload code coverage
        uses: codecov/codecov-action@v3
  functional-test:
    name: Functional test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest commit in the PR
        uses: actions/checkout@v3
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - name: Set up BPF and Linux Headers
        run: |
          sudo apt-get install -y libbpf-dev 
          sudo apt-get install -y bpftool 
          sudo apt-get install -y linux-headers-$(uname -r) libelf-dev zlib1g-dev
      - name: Build
        run: make build-linux
      - name: Functional test
        run: cd test && sudo make run-test
