name: Automatic Pull Request test

on:
  pull_request:
    branches:
      - "main"
      - "release*"

permissions:
  contents: read

jobs:
  unit-test:
    name: Unit test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest commit in the PR
        uses: actions/checkout@v3
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - name: Set up BPF and Linux Headers
        run: |
          sudo apt-get update

          # Try to install tools matching the *running kernel* (works when available)
          sudo apt-get install -y \
            libbpf-dev \
            linux-tools-$(uname -r) \
            linux-cloud-tools-$(uname -r) \
            linux-tools-generic \
            linux-cloud-tools-generic \
            || true

          # Find the actual bpftool binary (commonly shipped under /usr/lib/linux-tools/<ver>/bpftool)
          BPFTOOL_CANDIDATE="$(command -v bpftool || true)"
          if [ -z "$BPFTOOL_CANDIDATE" ]; then
            BPFTOOL_CANDIDATE="$(ls -1 /usr/lib/linux-tools/*/bpftool 2>/dev/null | head -n1 || true)"
          fi

          test -n "$BPFTOOL_CANDIDATE"
          echo "Using bpftool at: $BPFTOOL_CANDIDATE"
          sudo ln -sf "$BPFTOOL_CANDIDATE" /usr/local/bin/bpftool

          # sanity checks
          bpftool version || true
          test -r /sys/kernel/btf/vmlinux

      - name: Build
        run: make build-linux
      - name: Unit test
        run: sudo make unit-test
      - name: Upload code coverage
        uses: codecov/codecov-action@v3
  functional-test:
    name: Functional test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest commit in the PR
        uses: actions/checkout@v3
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - name: Set up BPF and Linux Headers
        run: |
          sudo apt-get install -y libbpf-dev 
          sudo apt-get install -y bpftool 
          sudo apt-get install -y linux-headers-$(uname -r) libelf-dev zlib1g-dev
      - name: Build
        run: make build-linux
      - name: Functional test
        run: cd test && sudo make run-test
