name: Automatic Pull Request test

on:
  pull_request:
    branches:
      - "main"
      - "release*"

permissions:
  contents: read

jobs:
  unit-test:
    name: Unit test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest commit in the PR
        uses: actions/checkout@v3
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - name: Set up tools
        run: |
          go install golang.org/x/lint/golint@latest
          go install golang.org/x/tools/cmd/goimports@latest
      - name: Run code checks
        run: |
          make check-format
          make vet
      - name: Set up BPF and Linux Headers
        run: |
          sudo apt-get update
          sudo apt-get install -y libbpf-dev 
          sudo apt-get install -y linux-tools-common 
          sudo apt-get install -y linux-headers-$(uname -r) libelf-dev zlib1g-dev
          git clone --depth=1 --branch v7.3.0 https://github.com/libbpf/bpftool.git
          cd bpftool/src
          make
          sudo make install    
      - name: Build
        run: make build-linux
      - name: Unit test
        run: sudo make unit-test
      - name: Upload code coverage
        uses: codecov/codecov-action@v3
  functional-test:
    name: Functional test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest commit in the PR
        uses: actions/checkout@v3
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - name: Set up BPF and Linux Headers
        run: |
          sudo apt-get install -y libbpf-dev 
          sudo apt-get install -y bpftool 
          sudo apt-get install -y linux-headers-$(uname -r) libelf-dev zlib1g-dev
      - name: Build
        run: make build-linux
      - name: Functional test
        run: cd test && sudo make run-test
